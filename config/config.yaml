# Pipeline configuration.
# All values locked from EDA (notebooks/inspection.ipynb) and README design decisions.
# Single source of truth — no parameters hardcoded in src/.

# --- Backtest window + rebalance cadence ---
dates:
  backtest_start: "2010-01-01"   # First bond panel date
  backtest_end:   "2018-12-01"   # Last bond panel date
  rebalance_freq: "M"            # Monthly, matches data frequency

# --- FRED data (cache download only; runtime reads parquet) ---
fred:
  api_key: ""                                    # Blank for security; required only by scripts/fred_download.py
  series:
    - VIXCLS
    - T10Y2Y
    - NFCI
  cache_path: "raw_data/fred_cache.parquet"
  pull_start: "2000-01-01"                          # 10y warmup for walk-forward z-score
  pull_end:   "2019-01-31"                          # 1mo buffer past backtest end

# --- Bond ingestion (src/data/ingest_bonds.py) ---
data:
  bond_csv: "raw_data/USHY_INDEX_20260301_part_1.csv"
  date_convention: "end_of_month"                   # Row T = end-of-month-T snapshot (per A.8); shift label at ingestion
  drop_null_cols: ["OASD", "DTS"]                   # 9 rows total
  drop_rating_groups: ["AA", "A", "BBB", "D_NR"]    # Fallen angels + defaulted/NR
  drop_class1: ["Government_Related"]               # 8 rows
  drop_class2: ["Agency"]                           # 8 rows (overlaps Government_Related)
  winsorize: false                                  # Inverse-DTS weighting handles outliers structurally
  min_history_months: 0                             # No filter — would create survivorship bias
  staleness_flag_bps: 1.0                           # |ΔOAS| < 1 bp flagged for monitoring (failure mode #1)

signal:
  name: "oas_oasd_carry"
  numerator: "OAS"
  denominator: "OASD"
  primary_quintile: 0.20                            # Headline backtest cutoff
  sensitivity_quintiles: [0.10, 0.20, 0.30]         # All three reported for robustness (not selection)
  weighting: "inverse_dts"                          # 1/DTS within selected universe, normalized to sum to 1
  lag_months: 1                                     # Signal inputs at row T predict return at row T+1 (per A.8)

# --- Regime classifier (src/regime/classifier.py) ---
regime:
  method: "walk_forward_zscore"
  window_months: 60                                 # Rolling z-score window
  min_periods: 24                                   # Warmup before z-score defined
  threshold_quantiles: [0.33, 0.67]    # Percentiles to fit on the pre-backtest composite
  threshold_fit_start: "2000-01-01"
  threshold_fit_end:   "2009-12-31"
  indicators:
    VIXCLS: "stress_high"
    T10Y2Y: "stress_low"                            # Sign-flipped in composite
    NFCI:   "stress_high"
  allocation:
    risk_on:  1.00
    neutral:  0.66
    risk_off: 0.33

# --- Portfolio construction (src/portfolio/construction.py) ---
portfolio:
  sector_cap: 0.20                                  # Max weight per Class3
  sector_field: "Class3"
  issuer_cap: null                                  # Open: lock during portfolio construction (90th-pct anchor = 4 bonds, unit = portfolio weight %)
  issuer_field: "Ticker"
  cash_proxy_series: "DGS3MO"                       # 3-month T-bill yield for undeployed capital under neutral/risk_off
  constraint_order: ["issuer_cap", "sector_cap"]    # Enforcement order

# --- Logging (src/utils/logging_config.py) ---
logging:
  level: "INFO"
  file: "logs/pipeline.log"
  console: true
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"